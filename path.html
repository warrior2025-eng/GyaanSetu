 <div class="profile-wrapper">
  <div class="profile-icon" id="profileIcon">

    <p id="userName">Guest User</p>

  </div>

<section class="container">
  <h2>Select Goal</h2>
  <p style="opacity:0.7;">
  Follow step-by-step roadmap and track your progress 🚀
</p>
  <select id="goalSelect">
    <option value="">Choose Goal</option>
    <option value="web">Web Developer</option>
    <option value="freelance">Freelancer</option>
  </select>

  <div class="action-row">
  <button id="continueBtn" class="btn small">▶ Continue</button>
  <button id="resetBtn" class="btn small danger">♻ Reset Progress</button>
</div>


  <div class="progress-box">
    Progress: <span id="progressText">0%</span>
    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
  </div>

  <div id="steps"></div>
</section>
